name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build debug + release APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Patch on_audio_query_android manifest
        run: |
          FILE=$(find ~/.pub-cache -path "*on_audio_query_android-*/android/src/main/AndroidManifest.xml")
          if [ -z "$FILE" ]; then
            echo "on_audio_query_android AndroidManifest.xml not found, skipping patch"
          elif ! grep -q 'package=' "$FILE"; then
            echo "No package attribute present, skipping patch"
          else
            sed -i -E 's/[[:space:]]+package="[^"]*"//' "$FILE"
            echo "Patched manifest: $FILE"
            cat "$FILE"
          fi

      - name: Patch on_audio_query_android namespace and JVM target
        run: |
          FILE=$(find ~/.pub-cache -path "*on_audio_query_android-*/android/build.gradle")
          if [ -z "$FILE" ]; then
            echo "on_audio_query_android build.gradle not found, skipping patch"
          else
            if ! grep -q "namespace" "$FILE"; then
              sed -i '/^android {/a\    namespace "com.lucasjosino.on_audio_query"' "$FILE"
              echo "Added namespace"
            fi
            if ! grep -q "sourceCompatibility" "$FILE"; then
              sed -i '/^android {/a\    compileOptions {\n        sourceCompatibility JavaVersion.VERSION_17\n        targetCompatibility JavaVersion.VERSION_17\n    }' "$FILE"
              echo "Added compileOptions"
            fi
            if ! grep -q "kotlinOptions" "$FILE"; then
              sed -i '/^android {/a\    kotlinOptions {\n        jvmTarget = "17"\n    }' "$FILE"
              echo "Added kotlinOptions"
            fi
            echo "Patched build.gradle: $FILE"
            cat "$FILE"
          fi

      - name: Analyze
        run: flutter analyze
        continue-on-error: true

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tunex-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tunex-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
